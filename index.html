<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>요트 다이스 — VS AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <header>
    <h1>요트 다이스 <span class="accent">VS</span> AI</h1>
    <div class="subtitle">최적 전략으로 계산된 AI와 12라운드 대결 · 요트는 포카인드/풀하우스에도 기록 가능</div>
  </header>

  <div class="status-bar">
    <div id="round-line">라운드 1 / 12</div>
    <div id="status-line">당신의 차례입니다.</div>
    <button id="reset-btn">새 게임</button>
  </div>

  <div class="dice-panel">
    <div id="dice-area"></div>
    <button id="roll-btn">주사위 굴리기 (1/3)</button>
  </div>

  <div class="boards">
    <section class="board human" id="panel-human">
      <h2><span class="player-dot"></span>당신</h2>
      <table>
        <tbody></tbody>
      </table>
      <div class="board-footer">
        <div>상단 합계: <span class="upper-sum">0 / 63</span></div>
        <div>보너스: <span class="bonus-val">0</span></div>
        <div class="total-row">총점 <span class="total-val">0</span></div>
      </div>
    </section>

    <section class="board bot" id="panel-bot">
      <h2><span class="player-dot"></span>AI</h2>
      <table>
        <tbody></tbody>
      </table>
      <div class="board-footer">
        <div>상단 합계: <span class="upper-sum">0 / 63</span></div>
        <div>보너스: <span class="bonus-val">0</span></div>
        <div class="total-row">총점 <span class="total-val">0</span></div>
      </div>
    </section>
  </div>

  <div id="game-over-banner" class="hidden"></div>

  <footer>Optimal-strategy DP table precomputed offline &middot; runs entirely in your browser</footer>
</div>

<script src="state_values.js"></script>
<script src="game.js"></script>
</body>
</html>
